services:
  - type: web
    name: akiba-blog
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: RENDER
        value: "true"
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: blog-data
      mountPath: /data
      sizeGB: 1
